name: Deploy Stage 3A Preview

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-stage3a-preview.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Stage 3A branch
        uses: actions/checkout@v4
        with:
          ref: stage3a-conversion-stabilization

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          touch dist/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add ../gh-pages origin/gh-pages
          rsync -a --delete dist/ ../gh-pages/
          cd ../gh-pages
          git add -A
          git commit -m "Deploy Stage 3A preview" || exit 0
          git push origin HEAD:gh-pages
